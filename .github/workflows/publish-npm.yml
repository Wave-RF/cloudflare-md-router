name: Publish (npm)

# ALL npm publishing for @wave-rf/cloudflare-md-router lives in this ONE file —
# npm allows only ONE trusted-publisher (workflow filename) per package, so the
# `dev` channel and tagged releases can't be split across two files. Configure
# the trusted publisher on npmjs.com → repo Wave-RF/cloudflare-md-router,
# workflow `publish-npm.yml` (see RELEASING.md). Three jobs:
#
#   release-please   maintains a release PR from Conventional Commits; on merge
#                    it tags vX.Y.Z + creates the GitHub Release and signals
#                    `release_created`.
#   publish-release  runs only when release-please cut a release (same workflow
#                    run, so the GITHUB_TOKEN-recursion rule never applies):
#                    npm publish to `latest` (or alpha/beta/rc/next for a
#                    prerelease version), with provenance via OIDC.
#   publish-dev      every push to main → content-addressed 0.0.0-dev.<hash>
#                    under the `dev` dist-tag, published only when the shipped
#                    content changed. Skips cleanly until the package exists
#                    (the one-time manual first publish — see RELEASING.md).
#
# Auth: OIDC trusted publishing — no NPM_TOKEN. Node 24 ships npm >= 11.5.1
# (required for OIDC) and dodges the broken in-place npm self-upgrade on older
# runner images, so we do NOT `npm i -g npm@latest`.

on:
  push:
    branches: [main]

# Don't cancel an in-progress publish; queue serially instead.
concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release commit, tag, and GitHub Release
      pull-requests: write # open/update the release PR
    outputs:
      # `releases_created` is release-please v4's stable top-level aggregate
      # (true if any release was cut); for a single root package it's exactly
      # "did we release?". (Per-path outputs are namespaced `.--release_created`.)
      release_created: ${{ steps.release.outputs.releases_created }}
    steps:
      # Defaults to GITHUB_TOKEN — no extra secret needed. A GITHUB_TOKEN-opened
      # release PR won't auto-run CI's required checks, so merge it with the admin
      # "merge without waiting for requirements" option (enforce_admins is off).
      # Optional upgrade: set a RELEASE_PLEASE_TOKEN PAT to have the release PR run
      # CI automatically. Manifest mode is auto-detected from the config + manifest.
      - uses: googleapis/release-please-action@v5 # pin to a SHA when convenient
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  publish-release:
    name: publish-release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve dist-tag from version
        id: meta
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          case "$version" in
            *-alpha*) tag=alpha ;;
            *-beta*)  tag=beta ;;
            *-rc*)    tag=rc ;;
            *-*)      tag=next ;;   # any other prerelease form
            *)        tag=latest ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing $version under dist-tag '$tag'."

      # This package ships raw TypeScript (no build step) and has no lifecycle
      # scripts — npm packs the `files` allowlist (src/, README.md, LICENSE)
      # directly. --ignore-scripts is belt-and-suspenders against a future hook.
      - name: Publish to npm
        run: npm publish --provenance --access public --tag "${{ steps.meta.outputs.dist_tag }}" --ignore-scripts

  publish-dev:
    name: publish-dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish @dev when the shipped content changes
        shell: bash
        run: |
          pkg="@wave-rf/cloudflare-md-router"
          # OIDC can't create a package that doesn't exist yet — before the
          # one-time manual first publish, skip cleanly (green) instead of failing.
          if ! npm view "$pkg" version >/dev/null 2>&1; then
            echo "::notice::$pkg is not on npm yet — do the one-time manual publish first (RELEASING.md). Skipping dev publish."
            exit 0
          fi
          version=$(node scripts/dev-version.mjs)
          if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
            echo "Shipped content unchanged — ${pkg}@${version} already published; nothing to do."
            exit 0
          fi
          npm version "$version" --no-git-tag-version --allow-same-version
          npm publish --provenance --access public --tag dev --ignore-scripts
