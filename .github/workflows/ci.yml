name: CI

on:
  push:
    branches: [main]
  pull_request:
    # `ready_for_review` isn't in the default set — without it, draft → ready
    # transitions don't re-trigger CI.
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  # Manual re-run escape hatch — `gh workflow run CI --ref <branch>`.
  workflow_dispatch:

permissions:
  contents: read

# PR pushes: cancel in-flight, only the latest commit matters. Main pushes:
# run each commit (the required check must exist per merged SHA).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: "11.1.3"
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Node 24 — matches .nvmrc and the publish job. pnpm 11 requires Node
          # >= 22.13, so the toolchain can't run on the package's declared >=18
          # floor; engines.node documents the consumer floor instead.
          node-version: "24"

      # No committed lockfile (this is a library — see .gitignore), so a frozen
      # install would fail; resolve fresh. The dep set is tiny.
      - run: pnpm install --no-frozen-lockfile

      - name: Lint + format check (Biome)
        run: pnpm run check

      - name: Typecheck (tsc --noEmit)
        run: pnpm run typecheck
